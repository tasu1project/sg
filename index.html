<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>セキュマネ弱点つぶし</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">情報セキュリティマネジメント試験 対策</p>
      <h1>セキュマネ弱点つぶし</h1>
      <p class="lead">分野別に解く。間違えた問題だけ戻す。正答率で弱点を見る。</p>
    </div>
    <div class="hero-card">
      <span id="totalQuestions">0</span>
      <small>登録問題</small>
    </div>
  </header>

  <main class="layout">
    <section class="panel controls" aria-label="学習メニュー">
      <h2>学習メニュー</h2>
      <label for="categorySelect">分野</label>
      <select id="categorySelect"></select>
      <div class="button-grid">
        <button id="startBtn">分野別で開始</button>
        <button id="wrongBtn" class="secondary">間違いだけ復習</button>
        <button id="resetBtn" class="ghost">履歴リセット</button>
      </div>
      <div class="mini-note">
        <strong>使い方</strong><br />
        まず分野別で解く → 間違えた問題だけ復習 → 正答率で穴を見る。
      </div>
    </section>

    <section class="panel quiz" aria-label="問題">
      <div class="quiz-top">
        <span id="modeBadge" class="badge">分野別</span>
        <span id="progressText">準備OK</span>
      </div>
      <h2 id="questionText">分野を選んで「開始」を押してください。</h2>
      <div id="choices" class="choices"></div>
      <div id="result" class="result hidden"></div>
      <div class="button-row">
        <button id="nextBtn" class="secondary">次の問題</button>
      </div>
    </section>

    <section class="panel stats" aria-label="成績">
      <h2>正答率</h2>
      <div class="score-ring"><span id="scoreRate">0%</span></div>
      <p id="scoreDetail">0問中 0問正解</p>
      <h3>分野別</h3>
      <div id="categoryStats" class="category-stats"></div>
      <h3>間違いリスト</h3>
      <div id="wrongList" class="wrong-list"></div>
    </section>
  </main>

  <footer>
    <p>問題データは <code>data/questions.js</code> を編集すると増やせます。ローカル保存はブラウザの localStorage を使用しています。</p>
  </footer>

  <script src="data/questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
